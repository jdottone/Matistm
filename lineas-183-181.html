<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta Paradas</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; transition: background 0.3s; }
        #estado { font-size: 24px; font-weight: bold; margin-top: 30px; padding: 20px; border-radius: 10px; }
        button { font-size: 20px; padding: 15px 40px; margin-top: 30px; border-radius: 8px; border: none; background-color: #333; color: white; cursor: pointer; }
        .viajando { background-color: #f4f4f4; color: #333; }
        .alerta { background-color: #d32f2f; color: white; }
    </style>
</head>
<body class="viajando">

    <h1>Alerta de Paradas</h1>
    
    <div id="estado">Presiona Iniciar al subirte al ómnibus</div>
    <button onclick="iniciarRastreo()">Iniciar Rastreo</button>

    <script>
        // Coordenadas de las paradas exactas de bajada
        const paradasDestino = {
            ida: { lat: -34.9095, lng: -56.1645, nombre: "Parada Bv. España (Ida a Hit)" }, // Aprox Bv España y Obligado
            vuelta: { lat: -34.8770, lng: -56.1664, nombre: "Parada Bv. Artigas y Pedernal" }
        };

        const RADIO_ALERTA = 150;
        let watchId = null;
        let alertaActiva = false;

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function detonarAlerta(mensaje) {
            if (!alertaActiva) {
                alertaActiva = true;
                document.body.className = "alerta";
                document.getElementById('estado').innerText = mensaje;
                
                // Sonido
                let audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                audio.loop = true; // Repite el pitido
                audio.play().catch(e => console.log("Audio bloqueado por el navegador."));
                
                // Vibración
                if ("vibrate" in navigator) {
                    navigator.vibrate([500, 200, 500, 200, 1000]);
                }
            }
        }

        function verificarUbicacion(posicion) {
            const miLat = posicion.coords.latitude;
            const miLng = posicion.coords.longitude;
            const divEstado = document.getElementById('estado');

            const distIda = calcularDistancia(miLat, miLng, paradasDestino.ida.lat, paradasDestino.ida.lng);
            const distVuelta = calcularDistancia(miLat, miLng, paradasDestino.vuelta.lat, paradasDestino.vuelta.lng);

            if (distIda <= RADIO_ALERTA) {
                detonarAlerta("¡TOCA TIMBRE! A 150m de la parada en Bv. España.");
            } else if (distVuelta <= RADIO_ALERTA) {
                detonarAlerta("¡TOCA TIMBRE! A 150m de Pedernal.");
            } else {
                alertaActiva = false;
                let distMinima = Math.min(distIda, distVuelta);
                let proxDestino = distIda < distVuelta ? "Bv. España" : "Pedernal";
                
                divEstado.innerText = "Rastreando... A " + Math.round(distMinima) + "m de la parada de " + proxDestino;
                document.body.className = "viajando";
            }
        }

        function iniciarRastreo() {
            if ("geolocation" in navigator) {
                document.getElementById('estado').innerText = "Conectando con GPS...";
                
                // Forzar permiso de audio con un sonido en blanco
                let audioInit = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
                audioInit.play().catch(e => {});

                watchId = navigator.geolocation.watchPosition(
                    verificarUbicacion,
                    (error) => alert("Error GPS: " + error.message),
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            } else {
                alert("Geolocalización no soportada.");
            }
        }
    </script>
</body>
</html>
